language: en
tone_instructions: "Be concise and direct. Focus on bugs, security issues, and logic errors. Skip style nitpicks already covered by ESLint/svelte-check."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!bun.lock"
    - "!*.sql"
    - "!supabase/migrations/**"
    - "!static/**"
    - "!.github/**"

chat:
  auto_reply: true
